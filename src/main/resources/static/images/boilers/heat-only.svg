<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700">
    <defs>
        <linearGradient id="boilerGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f8f8f8"/>
            <stop offset="100%" stop-color="#e9e9e9"/>
        </linearGradient>

        <linearGradient id="tankGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ececec"/>
            <stop offset="50%" stop-color="#fafafa"/>
            <stop offset="100%" stop-color="#d2d6de"/>
        </linearGradient>

        <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#c2c7cf"/>
            <stop offset="50%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#aeb5bf"/>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.12"/>
        </filter>
    </defs>

    <rect width="100%" height="100%" fill="#ffffff"/>

    <!-- BOILER -->
    <g filter="url(#shadow)">
        <rect x="70" y="120" width="180" height="250" rx="16"
              fill="url(#boilerGrad)" stroke="#d6dbe2"/>
        <line x1="70" y1="290" x2="250" y2="290" stroke="#e3e7ee"/>
        <rect x="120" y="170" width="80" height="10" rx="5" fill="#6f7781"/>
    </g>

    <!-- BUTTONS -->
    <g fill="#cfcfcf" stroke="#8e8e8e" stroke-width="2">
        <circle cx="130" cy="320" r="8"/>
        <circle cx="160" cy="320" r="8"/>
        <circle cx="190" cy="320" r="8"/>
    </g>

    <!-- PIPES DOWN -->
    <g fill="#c6c6c6" stroke="#868686" stroke-width="2">
        <rect x="120" y="360" width="10" height="140" rx="5"/>
        <rect x="145" y="360" width="10" height="140" rx="5"/>
        <rect x="170" y="360" width="10" height="140" rx="5"/>
    </g>

    <!-- CYLINDER -->
    <g filter="url(#shadow)">
        <ellipse cx="365" cy="260" rx="90" ry="20" fill="#e9edf3"/>
        <rect x="275" y="260" width="180" height="230" rx="22"
              fill="url(#tankGrad)" stroke="#d0d6e2"/>
        <ellipse cx="365" cy="490" rx="90" ry="20" fill="#d9dee7"/>
    </g>

    <!-- EXPANSION TANK -->
    <g filter="url(#shadow)">
        <rect x="300" y="60" width="110" height="60" rx="10"
              fill="url(#tankGrad)" stroke="#cfd6e2"/>
    </g>

    <!-- PIPE FROM EXPANSION TANK -->
    <g fill="#c6c6c6" stroke="#868686" stroke-width="2">
        <rect x="350" y="120" width="10" height="60" rx="5"/>
        <rect x="250" y="180" width="100" height="10" rx="5"/>
    </g>

    <!-- HOT WATER PIPE -->
    <g fill="#c6c6c6" stroke="#868686" stroke-width="2">
        <rect x="410" y="200" width="12" height="70" rx="6"/>
        <rect x="398" y="188" width="24" height="12" rx="4"/>
    </g>

    <!-- PIPE TO CYLINDER -->
    <g fill="#c6c6c6" stroke="#868686" stroke-width="2">
        <rect x="180" y="400" width="95" height="10" rx="5"/>
        <rect x="180" y="440" width="95" height="10" rx="5"/>
    </g>
</svg>


<svg xmlns="http://www.w3.org/2000/svg" width="500" height="700" viewBox="0 0 500 700">

    <defs>
        <!-- мягкий градиент -->
        <linearGradient id="boilerGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f9f9f9"/>
            <stop offset="100%" stop-color="#eaeaea"/>
        </linearGradient>

        <!-- металл труб -->
        <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#dcdcdc"/>
            <stop offset="50%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#cfcfcf"/>
        </linearGradient>

        <!-- тень -->
        <filter id="shadow">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.15"/>
        </filter>
    </defs>

    <!-- фон -->
    <rect width="100%" height="100%" fill="#ffffff"/>

    <!-- бойлер -->
    <g filter="url(#shadow)">
        <rect x="120" y="80" width="260" height="360" rx="18" fill="url(#boilerGrad)" stroke="#d0d0d0"/>

        <!-- верхняя линия -->
        <line x1="120" y1="300" x2="380" y2="300" stroke="#e0e0e0"/>

        <!-- логотип линия -->
        <rect x="200" y="140" width="100" height="12" rx="6" fill="#888"/>
    </g>

    <!-- кнопки -->
    <g fill="#cfcfcf" stroke="#8e8e8e" stroke-width="2">
        <circle cx="200" cy="330" r="12"/>
        <circle cx="300" cy="330" r="12"/>
        <circle cx="200" cy="370" r="12"/>
        <circle cx="300" cy="370" r="12"/>
        <circle cx="240" cy="370" r="8"/>
        <circle cx="260" cy="370" r="8"/>
    </g>

    <!-- трубы -->
    <g fill="#c6c6c6" stroke="#868686" stroke-width="2">

        <!-- 5 труб -->
        <rect x="185" y="440" width="14" height="160" rx="7"/>
        <rect x="215" y="440" width="14" height="160" rx="7"/>
        <rect x="245" y="440" width="14" height="160" rx="7"/>
        <rect x="275" y="440" width="14" height="160" rx="7"/>
        <rect x="305" y="440" width="14" height="160" rx="7"/>

        <!-- краны -->
        <rect x="180" y="430" width="24" height="12" rx="4"/>
        <rect x="210" y="430" width="24" height="12" rx="4"/>
        <rect x="240" y="430" width="24" height="12" rx="4"/>
        <rect x="270" y="430" width="24" height="12" rx="4"/>
        <rect x="300" y="430" width="24" height="12" rx="4"/>

    </g>

</svg>

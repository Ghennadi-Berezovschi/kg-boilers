<svg xmlns="http://www.w3.org/2000/svg" width="500" height="700" viewBox="0 0 500 700">
    <defs>
        <linearGradient id="boilerGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f9f9f9"/>
            <stop offset="100%" stop-color="#eaeaea"/>
        </linearGradient>

        <linearGradient id="tankGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f7f8fb"/>
            <stop offset="100%" stop-color="#dfe4ee"/>
        </linearGradient>

        <linearGradient id="pipeGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#dcdcdc"/>
            <stop offset="50%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#cfcfcf"/>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.15"/>
        </filter>
    </defs>

    <rect width="100%" height="100%" fill="#ffffff"/>

    <!-- boiler -->
    <g filter="url(#shadow)">
        <rect x="85" y="80" width="200" height="300" rx="18" fill="url(#boilerGrad)" stroke="#d0d0d0"/>
        <line x1="85" y1="260" x2="285" y2="260" stroke="#e0e0e0"/>
        <rect x="145" y="135" width="80" height="10" rx="5" fill="#777"/>

        <circle cx="145" cy="315" r="10" fill="#cfcfcf" stroke="#8e8e8e" stroke-width="2"/>
        <circle cx="185" cy="315" r="10" fill="#cfcfcf" stroke="#8e8e8e" stroke-width="2"/>
        <circle cx="225" cy="315" r="10" fill="#cfcfcf" stroke="#8e8e8e" stroke-width="2"/>
    </g>

    <!-- cylinder -->
    <g filter="url(#shadow)">
        <ellipse cx="365" cy="205" rx="105" ry="26" fill="#edf0f6"/>
        <rect x="260" y="205" width="210" height="250" rx="18" fill="url(#tankGrad)" stroke="#d0d6e2"/>
        <ellipse cx="365" cy="455" rx="105" ry="26" fill="#dde3ee"/>
        <ellipse cx="365" cy="205" rx="105" ry="26" fill="#f7f9fc" stroke="#d0d6e2"/>
    </g>

    <!-- simple upper pipe from cylinder -->
    <g fill="#c6c6c6" stroke="#868686" stroke-width="2">
        <rect x="396" y="120" width="14" height="70" rx="7"/>
        <rect x="396" y="110" width="18" height="12" rx="4"/>
    </g>

    <!-- pipes between boiler and cylinder -->
    <g fill="#c6c6c6" stroke="#868686" stroke-width="2">
        <rect x="155" y="380" width="14" height="150" rx="7"/>
        <rect x="185" y="380" width="14" height="150" rx="7"/>
        <rect x="215" y="380" width="14" height="150" rx="7"/>

        <rect x="148" y="370" width="28" height="12" rx="4"/>
        <rect x="178" y="370" width="28" height="12" rx="4"/>
        <rect x="208" y="370" width="28" height="12" rx="4"/>

        <rect x="229" y="410" width="135" height="14" rx="7"/>
        <rect x="229" y="470" width="135" height="14" rx="7"/>
    </g>
</svg>

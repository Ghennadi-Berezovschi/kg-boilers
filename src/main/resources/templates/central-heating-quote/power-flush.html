<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Central Heating Power Flush</title>

    <link rel="stylesheet" th:href="@{/css/style.css(v='20260416-1955')}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>
            Has your heating system been chemically <span style="color:#ff5a3c;">power flushed</span> within the last 5 years?
        </h2>

        <div class="grid fuel-grid">
            <article class="card fuel-card" onclick="selectPowerFlush('yes-done')">
                <div class="fuel-icon">
                    <img src="/images/central-heating/power-flush-machine.jpg"
                         alt="Central heating power flush machine"
                         class="power-flush-photo"
                         width="144"
                         height="144">
                </div>
                <h3 class="fuel-title">Yes, it was done</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectPowerFlush('no-not-done')">
                <div class="fuel-icon">
                    <img src="/images/central-heating/power-flush-machine.jpg"
                         alt="Central heating power flush machine"
                         class="power-flush-photo"
                         width="144"
                         height="144">
                </div>
                <h3 class="fuel-title">No, it was not done</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectPowerFlush('do-not-know')">
                <div class="fuel-icon">❓</div>
                <h3 class="fuel-title">I do not know what it is</h3>
                <div class="fuel-select">Select</div>
            </article>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script>
    const resultElement = document.getElementById("result");

    async function selectPowerFlush(powerFlushStatus) {
        clearError();

        try {
            const response = await fetch("/central-heating-quote/power-flush", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ powerFlushStatus: powerFlushStatus })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep;
        } catch (error) {
            console.error("Power flush error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Central Heating Bedrooms</title>

    <link rel="stylesheet" th:href="@{/css/style.css(v='20260416-1849')}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>
            How many <span style="color:#ff5a3c;">bedrooms</span> do you have?
        </h2>

        <div class="grid fuel-grid">
            <article class="card fuel-card" onclick="selectBedrooms('ONE')">
                <div class="fuel-icon">🛏️</div>
                <h3 class="fuel-title">1 Bedroom</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectBedrooms('TWO')">
                <div class="fuel-icon">🛏️</div>
                <h3 class="fuel-title">2 Bedrooms</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectBedrooms('THREE')">
                <div class="fuel-icon">🛏️</div>
                <h3 class="fuel-title">3 Bedrooms</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectBedrooms('FOUR')">
                <div class="fuel-icon">🛏️</div>
                <h3 class="fuel-title">4 Bedrooms</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectBedrooms('FIVE')">
                <div class="fuel-icon">🛏️</div>
                <h3 class="fuel-title">5 Bedrooms</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectBedrooms('SIX_PLUS')">
                <div class="fuel-icon">🏠</div>
                <h3 class="fuel-title">6+ Bedrooms</h3>
                <div class="fuel-select">Select</div>
            </article>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script>
    const resultElement = document.getElementById("result");

    async function selectBedrooms(bedrooms) {
        clearError();

        try {
            const response = await fetch("/central-heating-quote/bedrooms", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ bedrooms: bedrooms })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep;
        } catch (error) {
            console.error("Bedrooms error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

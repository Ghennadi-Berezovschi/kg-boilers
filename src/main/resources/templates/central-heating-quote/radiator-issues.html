<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Central Heating Radiator Issues</title>

    <link rel="stylesheet" th:href="@{/css/style.css(v='20260417-1520')}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>What do you need help with regarding your heating?</h2>e
        <p class="section-subtitle">
            Select all that apply. If your issue is not listed, choose <strong>Something else</strong> and describe it.
        </p>

        <div class="radiator-issues-panel card">
            <div class="radiator-issues-list">
                <label class="radiator-issue-option" th:each="issue : ${radiatorIssueOptions}">
                    <input type="checkbox"
                           class="radiator-issue-checkbox"
                           th:value="${issue.value}"
                           th:data-other="${issue.name() == 'SOMETHING_ELSE'}">
                    <span class="radiator-issue-copy">
                        <span class="radiator-issue-title" th:text="${issue.label}">Install a radiator in the same location</span>
                    </span>
                </label>
            </div>

            <div class="radiator-issues-other js-radiator-other" hidden>
                <label class="radiator-issues-other-label" for="otherIssueDetails">Please describe the issue</label>
                <textarea id="otherIssueDetails"
                          class="radiator-issues-textarea"
                          rows="4"
                          placeholder="Describe the radiator problem"></textarea>
            </div>

            <div class="radiator-issues-actions">
                <button type="button" id="radiatorIssuesBtn" class="card-cta">Continue →</button>
            </div>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script>
    const resultElement = document.getElementById("result");
    const continueButton = document.getElementById("radiatorIssuesBtn");
    const checkboxes = Array.from(document.querySelectorAll(".radiator-issue-checkbox"));
    const otherWrap = document.querySelector(".js-radiator-other");
    const otherTextarea = document.getElementById("otherIssueDetails");

    continueButton.addEventListener("click", submitRadiatorIssues);
    checkboxes.forEach(checkbox => checkbox.addEventListener("change", syncOtherField));
    otherTextarea.addEventListener("input", clearError);

    function syncOtherField() {
        const needsOther = checkboxes.some(checkbox => checkbox.dataset.other === "true" && checkbox.checked);
        otherWrap.hidden = !needsOther;

        if (!needsOther) {
            otherTextarea.value = "";
        }

        clearError();
    }

    async function submitRadiatorIssues() {
        clearError();

        const radiatorIssues = checkboxes
            .filter(checkbox => checkbox.checked)
            .map(checkbox => checkbox.value);

        if (radiatorIssues.length === 0) {
            showError("Please select at least one radiator issue");
            return;
        }

        if (radiatorIssues.includes("something-else") && !otherTextarea.value.trim()) {
            showError("Please describe the issue in Something else");
            otherTextarea.focus();
            return;
        }

        setLoading(true);

        try {
            const response = await fetch("/central-heating-quote/radiator-issues", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    radiatorIssues: radiatorIssues,
                    otherIssueDetails: otherTextarea.value.trim()
                })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep;
        } catch (error) {
            console.error("Radiator issues error:", error);
            showError("Something went wrong. Please try again.");
        } finally {
            setLoading(false);
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }

    function setLoading(isLoading) {
        continueButton.disabled = isLoading;
        continueButton.textContent = isLoading ? "Saving..." : "Continue →";
    }
</script>

</body>
</html>

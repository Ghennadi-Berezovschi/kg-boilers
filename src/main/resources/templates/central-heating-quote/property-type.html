<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Central Heating Property Type</title>

    <link rel="stylesheet" th:href="@{/css/style.css(v='20260416-1849')}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>
            What type of <span style="color:#ff5a3c;">property</span> is it?
        </h2>

        <div class="grid fuel-grid">
            <article class="card fuel-card" onclick="selectType('HOUSE')">
                <div class="fuel-icon">🏠</div>
                <h3 class="fuel-title">House</h3>
                <div class="fuel-desc">
                    Detached, semi-detached, terraced, or end-of-terrace property
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectType('FLAT')">
                <div class="fuel-icon">🏢</div>
                <h3 class="fuel-title">Flat / Apartment</h3>
                <div class="fuel-desc">
                    A flat within a building
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectType('BUNGALOW')">
                <div class="fuel-icon">🏡</div>
                <h3 class="fuel-title">Bungalow</h3>
                <div class="fuel-desc">
                    Single-floor house
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectType('OTHER')">
                <div class="fuel-icon">❓</div>
                <h3 class="fuel-title">Other</h3>
                <div class="fuel-desc">
                    Not sure or something different
                </div>
                <div class="fuel-select">Select</div>
            </article>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script>
    const resultElement = document.getElementById("result");

    async function selectType(type) {
        clearError();

        try {
            const response = await fetch("/central-heating-quote/property-type", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ propertyType: type })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep;
        } catch (error) {
            console.error("Property type error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

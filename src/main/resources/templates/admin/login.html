<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-page">
<main class="admin-login-shell">
    <section class="admin-login-card">
        <p class="admin-eyebrow">Admin area</p>
        <h1>Quote dashboard</h1>
        <p>Sign in to view customer quote requests.</p>

        <div class="admin-alert admin-alert-error" th:if="${!adminConfigured}">
            Admin username and password are not configured in .env.
        </div>
        <div class="admin-alert admin-alert-error" th:if="${error}" th:text="${error}"></div>
        <div class="admin-alert admin-alert-success" th:if="${message}" th:text="${message}"></div>

        <form th:action="@{/admin/login}" method="post" class="admin-form">
            <input th:if="${_csrf != null}"
                   type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <label>
                Username
                <input type="text" name="username" autocomplete="username" required>
            </label>
            <label>
                Password
                <span class="admin-password-field">
                    <input id="adminPassword"
                           type="password"
                           name="password"
                           autocomplete="current-password"
                           required>
                    <button type="button"
                            class="admin-password-toggle"
                            aria-controls="adminPassword"
                            aria-pressed="false">
                        Show
                    </button>
                </span>
            </label>
            <button type="submit" class="admin-primary-button">Sign in</button>
        </form>
    </section>
</main>
<script>
    (function () {
        const passwordInput = document.getElementById("adminPassword");
        const toggleButton = document.querySelector(".admin-password-toggle");

        if (!passwordInput || !toggleButton) {
            return;
        }

        toggleButton.addEventListener("click", function () {
            const isVisible = passwordInput.type === "text";
            passwordInput.type = isVisible ? "password" : "text";
            toggleButton.textContent = isVisible ? "Show" : "Hide";
            toggleButton.setAttribute("aria-pressed", String(!isVisible));
        });
    })();
</script>
</body>
</html>

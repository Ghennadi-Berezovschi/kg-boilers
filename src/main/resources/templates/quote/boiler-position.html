<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Boiler Position</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
  <section class="section">

    <a th:if="${backUrl != null}"
       th:href="${backUrl}"
       class="back-link"
       aria-label="Go back">← Back</a>

    <h2>
      Is your <span style="color:#ff5a3c;">boiler</span> sitting on the floor or mounted on the wall?
    </h2>

    <div class="grid fuel-grid">
      <article class="card fuel-card" onclick="selectPosition('floor-standing')">
        <div class="fuel-icon">
          <img src="/images/boilers/floor-mounted.svg"
               alt="Floor-mounted boiler diagram"
               width="120"
               height="170">
        </div>
        <h3 class="fuel-title">Floor-mounted</h3>
        <div class="fuel-desc">
          The boiler sits on the floor.
        </div>
        <div class="fuel-select">Select</div>
      </article>

      <article class="card fuel-card" onclick="selectPosition('wall-mounted')">
        <div class="fuel-icon">
          <img src="/images/boilers/wall-mounted.svg"
               alt="Wall-mounted boiler diagram"
               width="120"
               height="170">
        </div>
        <h3 class="fuel-title">Wall-mounted</h3>
        <div class="fuel-desc">
          The boiler is fixed to the wall.
        </div>
        <div class="fuel-select">Select</div>
      </article>
    </div>

    <p id="result" class="quote-result" aria-live="polite"></p>
  </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script>
  const resultElement = document.getElementById("result");

  async function selectPosition(boilerPosition) {
    clearError();

    try {
      const response = await fetch("/quote/boiler-position", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ boilerPosition: boilerPosition })
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        handleError(data);
        return;
      }

      window.location.href = data.nextStep;
    } catch (error) {
      console.error("Boiler position error:", error);
      showError("Something went wrong. Please try again.");
    }
  }

  function handleError(data) {
    const message = data?.message;
    showError(message || "Something went wrong. Please try again.");
  }

  function showError(message) {
    resultElement.textContent = "❌ " + message;
  }

  function clearError() {
    resultElement.textContent = "";
  }
</script>

</body>
</html>

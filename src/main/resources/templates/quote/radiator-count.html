<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Radiators</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>
            How many <span style="color:#ff5a3c;">radiators</span> do you have?
        </h2>
        <p class="section-subtitle">
            Count the radiators that heat your home.
        </p>

        <div class="radiator-grid">
            <article class="card fuel-card radiator-card" onclick="selectRadiatorCount('0-5')">
                <div class="fuel-icon range-value">0-5</div>
                <h3 class="fuel-title">0-5 radiators</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card radiator-card" onclick="selectRadiatorCount('6-9')">
                <div class="fuel-icon range-value">6-9</div>
                <h3 class="fuel-title">6-9 radiators</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card radiator-card" onclick="selectRadiatorCount('10-13')">
                <div class="fuel-icon range-value">10-13</div>
                <h3 class="fuel-title">10-13 radiators</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card radiator-card" onclick="selectRadiatorCount('14-16')">
                <div class="fuel-icon range-value">14-16</div>
                <h3 class="fuel-title">14-16 radiators</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card radiator-card" onclick="selectRadiatorCount('17+')">
                <div class="fuel-icon range-value">17+</div>
                <h3 class="fuel-title">17+ radiators</h3>
                <div class="fuel-select">Select</div>
            </article>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script>
    const resultElement = document.getElementById("result");

    async function selectRadiatorCount(radiatorCount) {
        clearError();

        try {
            const response = await fetch("/quote/radiator-count", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ radiatorCount: radiatorCount })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep.trim();
        } catch (error) {
            console.error("Radiator count error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

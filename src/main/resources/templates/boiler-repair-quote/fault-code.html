<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Boiler Repair Fault Code</title>

    <link rel="stylesheet" th:href="@{/css/style.css(v='20260421-1238')}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>
            Is there a <span style="color:#ff5a3c;">fault code, message or signal</span> showing on your boiler or thermostat?
        </h2>

        <div class="grid fuel-grid">
            <article class="card fuel-card" onclick="selectFaultCode('yes-showing')">
                <div class="fuel-icon" style="color:#ff5a3c;">⚠</div>
                <h3 class="fuel-title">Yes</h3>
                <div class="fuel-desc">
                    There is a code, message or warning showing.
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectFaultCode('no-not-showing')">
                <div class="fuel-icon" style="color:#2e9f5b;">✓</div>
                <h3 class="fuel-title">No</h3>
                <div class="fuel-desc">
                    Nothing is showing on the boiler or thermostat.
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectFaultCode('do-not-know')">
                <div class="fuel-icon" style="color:#ff5a3c;">❓</div>
                <h3 class="fuel-title">I do not know</h3>
                <div class="fuel-desc">
                    I am not sure whether anything is showing.
                </div>
                <div class="fuel-select">Select</div>
            </article>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script>
    const resultElement = document.getElementById("result");

    async function selectFaultCode(faultCodeDisplayStatus) {
        clearError();

        try {
            const response = await fetch("/quote/fault-code", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ faultCodeDisplayStatus: faultCodeDisplayStatus })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep;
        } catch (error) {
            console.error("Fault code error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Roof Position</title>

    <link rel="stylesheet" th:href="@{/css/style.css(v='20260420-1137')}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>
            Where on the <span style="color:#ff5a3c;">roof</span> is it positioned?
        </h2>
        <p class="section-subtitle">
            Choose where the flue terminal sits on the sloped roof.
        </p>

        <div class="grid fuel-grid">
            <article class="card fuel-card" onclick="selectRoofPosition('highest-two-thirds')">
                <div class="fuel-icon">
                    <img th:src="@{/images/flues/sloped-roof-highest-two-thirds.svg(v='20260420-1308')}"
                         alt="Sloped roof flue in the highest two-thirds"
                         width="150"
                         height="150">
                </div>
                <h3 class="fuel-title">Upper half of the roof</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectRoofPosition('lowest-third')">
                <div class="fuel-icon">
                    <img th:src="@{/images/flues/sloped-roof-lowest-third.svg(v='20260420-1308')}"
                         alt="Sloped roof flue in the lowest third"
                         width="150"
                         height="150">
                </div>
                <h3 class="fuel-title">Lower half of the roof</h3>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectRoofPosition('i-do-not-know')">
                <div class="fuel-icon" style="font-size:4rem; color:#ff5a3c;">?</div>
                <h3 class="fuel-title">I do not know / Somewhere else</h3>
                <div class="fuel-select">Select</div>
            </article>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script>
    const resultElement = document.getElementById("result");

    async function selectRoofPosition(roofPosition) {
        clearError();

        try {
            const response = await fetch("/quote/sloped-roof-position", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ roofPosition: roofPosition })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep.trim();
        } catch (error) {
            console.error("Sloped roof position error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

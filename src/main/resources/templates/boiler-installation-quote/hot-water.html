<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Hot Water</title>

    <link rel="stylesheet" th:href="@{/css/style.css(v='20260416-0805')}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>Do you have <span style="color:#ff5a3c;">hot water</span>?</h2>

        <div class="grid fuel-grid">
            <article class="card fuel-card" onclick="selectHotWater(true)">
                <div class="fuel-icon">✅</div>
                <h3 class="fuel-title">Yes</h3>
                <div class="fuel-desc">
                    There is hot water at the taps.
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectHotWater(false)">
                <div class="fuel-icon" style="color:#ff5a3c;">✖</div>
                <h3 class="fuel-title">No</h3>
                <div class="fuel-desc">
                    There is no hot water at the taps.
                </div>
                <div class="fuel-select">Select</div>
            </article>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script th:inline="javascript">
    const resultElement = document.getElementById("result");
    const quoteApiBasePath = /*[[${quoteApiBasePath}]]*/ "/quote";

    async function selectHotWater(hotWaterAvailable) {
        clearError();

        try {
            const response = await fetch(`${quoteApiBasePath}/hot-water`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ hotWaterAvailable: hotWaterAvailable })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep;
        } catch (error) {
            console.error("Hot water error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

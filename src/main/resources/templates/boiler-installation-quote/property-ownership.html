<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Property Ownership</title>

    <link rel="stylesheet" th:href="@{/css/style.css(v='20260416-0805')}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>
            Are you the <span style="color:#ff5a3c;">homeowner</span> or <span style="color:#ff5a3c;">landlord</span>?
        </h2>

        <div class="grid fuel-grid">
            <article class="card fuel-card" onclick="selectOwnership('homeowner')">
                <div class="fuel-icon">🏠</div>
                <h3 class="fuel-title">Homeowner</h3>
                <div class="fuel-desc">
                    You own and live in the property.
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectOwnership('landlord')">
                <div class="fuel-icon">📄</div>
                <h3 class="fuel-title">Landlord</h3>
                <div class="fuel-desc">
                    You rent this property to tenants.
                </div>
                <div class="fuel-select">Select</div>
            </article>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script th:inline="javascript">
    const resultElement = document.getElementById("result");
    const quoteApiBasePath = /*[[${quoteApiBasePath}]]*/ "/quote";

    async function selectOwnership(type) {
        clearError();

        try {
            const response = await fetch(`${quoteApiBasePath}/property-ownership`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ ownership: type })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep;
        } catch (error) {
            console.error("Ownership error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

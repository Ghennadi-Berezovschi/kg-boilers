<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Relocation</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>
            Do you want your new <span style="color:#ff5a3c;">boiler in a different location</span>?
        </h2>

        <div class="grid fuel-grid">

            <article class="card fuel-card" onclick="selectRelocation('no')">
                <div class="fuel-icon">❌</div>
                <h3 class="fuel-title">No</h3>
                <div class="fuel-desc">
                    Keep the new boiler in the same location.
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectRelocation('yes')">
                <div class="fuel-icon">✅</div>
                <h3 class="fuel-title">Yes</h3>
                <div class="fuel-desc">
                    Move the new boiler to a different location.
                </div>
                <div class="fuel-select">Select</div>
            </article>

        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script>
    const resultElement = document.getElementById("result");

    async function selectRelocation(relocation) {
        clearError();

        try {
            const response = await fetch("/quote/relocation", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ relocation: relocation })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep.trim();
        } catch (error) {
            console.error("Relocation error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const message = data?.message;
        showError(message || "Something went wrong. Please try again.");
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Fuel Type</title>

    <link rel="stylesheet" th:href="@{/css/style.css(v='20260416-0805')}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <section class="section">

        <a th:if="${backUrl != null}"
           th:href="${backUrl}"
           class="back-link"
           aria-label="Go back">← Back</a>

        <h2>
            What kind of <span style="color:#ff5a3c;">fuel</span> does your boiler use?
        </h2>

        <div class="grid fuel-grid">
            <article class="card fuel-card" onclick="selectFuel('gas')">
                <div class="fuel-icon">🔥</div>
                <h3 class="fuel-title">Gas</h3>
                <div class="fuel-desc">
                    If you have a gas meter, your boiler uses gas.
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectFuel('lpg')">
                <div class="fuel-icon">🔥</div>
                <h3 class="fuel-title">LPG</h3>
                <div class="fuel-desc">
                    Usually stored in a tank outside your home.
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectFuel('oil')">
                <div class="fuel-icon">💧</div>
                <h3 class="fuel-title">Oil</h3>
                <div class="fuel-desc">
                    Common in rural homes with an oil tank.
                </div>
                <div class="fuel-select">Select</div>
            </article>

            <article class="card fuel-card" onclick="selectFuel('electric')">
                <div class="fuel-icon">⚡</div>
                <h3 class="fuel-title">Electric</h3>
                <div class="fuel-desc">
                    No gas supply, powered by electricity.
                </div>
                <div class="fuel-select">Select</div>
            </article>
        </div>

        <p id="result" class="quote-result" aria-live="polite"></p>
    </section>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

<script th:inline="javascript">
    const resultElement = document.getElementById("result");
    const quoteApiBasePath = /*[[${quoteApiBasePath}]]*/ "/quote";

    async function selectFuel(fuelType) {
        clearError();

        try {
            const response = await fetch(`${quoteApiBasePath}/fuel`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ fuel: fuelType })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                handleError(data);
                return;
            }

            window.location.href = data.nextStep;
        } catch (error) {
            console.error("Fuel selection error:", error);
            showError("Something went wrong. Please try again.");
        }
    }

    function handleError(data) {
        const errorCode = data?.errorCode;
        const message = data?.message;

        switch (errorCode) {
            case "UNSUPPORTED_FUEL":
                showError(message || "Sorry, this fuel type is not supported");
                break;

            case "SESSION_EXPIRED":
                showError(message || "Please start your quote again");
                break;

            default:
                showError(message || "Something went wrong. Please try again.");
        }
    }

    function showError(message) {
        resultElement.textContent = "❌ " + message;
    }

    function clearError() {
        resultElement.textContent = "";
    }
</script>

</body>
</html>

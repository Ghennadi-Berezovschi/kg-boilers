<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${company.name}">K&amp;G Boiler Services</title>

    <meta name="description"
          content="K&G Boiler Services provides boiler installation, boiler repair, boiler replacement and gas safety services across London and surrounding areas.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kg-boilers.com/">
    <meta property="og:title" th:content="${company.name + ' London'}" content="K&G Boiler Services London">
    <meta property="og:description" content="Boiler installation, boiler repair, boiler replacement and gas safety services across London and surrounding areas.">
    <meta property="og:image" content="https://kg-boilers.com/images/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://kg-boilers.com/">
    <meta property="twitter:title" th:content="${company.name + ' London'}" content="K&G Boiler Services London">
    <meta property="twitter:description" content="Boiler installation, boiler repair, boiler replacement and gas safety services across London and surrounding areas.">
    <meta property="twitter:image" content="https://kg-boilers.com/images/og-image.jpg">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/_header :: header}"></div>

<main class="container">
    <div th:replace="~{fragments/_hero :: hero}"></div>
    <div th:replace="~{fragments/_services :: services}"></div>
</main>

<div th:replace="~{fragments/_footer :: footer}"></div>

</body>
</html>

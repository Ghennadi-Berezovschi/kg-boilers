<style>
    .fuel-title,
    .fuel-card .fuel-title {
        color: #1f2f57 !important;
    }
    .fuel-title:hover,
    .fuel-card:hover .fuel-title {
        color: #1f2f57 !important;
    }
</style>

<div th:fragment="header">
    <header class="site-header">

        <div class="container header-row">

            <!-- Brand -->
            <a class="brand"
               th:href="@{/}"
               aria-label="K&G Boiler Installation and Repair home">

                <span class="brand-title">
                    K&amp;G Boiler Installation and Repair
                </span>

                <span class="brand-subtitle">
                    London &amp; surrounding areas
                </span>

            </a>

            <!-- Contact actions -->
            <nav class="actions" aria-label="Contact options">


                <!-- Phone -->
                <a class="btn btn-phone"
                   th:href="'tel:' + ${contact.phone}">
                    <span class="btn-label-full">Call:</span>
                    <span class="btn-label-short">Call us</span>
                    <span class="btn-phone-number" th:text="${contact.phoneDisplay}">
                        +44 7552532075
                    </span>
                </a>

                <!-- WhatsApp -->
                <a class="btn btn-wa"
                   th:href="${contact.whatsapp}"
                   target="_blank"
                   rel="noopener noreferrer">
                    <span class="btn-label-full">WhatsApp chat</span>
                    <span class="btn-label-short">WhatsApp</span>
                </a>


                <!-- Email -->
                <a class="btn btn-email"
                   th:href="'mailto:' + ${contact.email}">
                    <span class="btn-label-full">Email us</span>
                    <span class="btn-label-short">Email</span>
                </a>

                <!-- Callback -->
                <a class="btn btn-callback"
                   href="#callback">
                    <span class="btn-label-full">Request callback</span>
                    <span class="btn-label-short">Call me</span>
                </a>

            </nav>

        </div>

    </header>

    <div th:replace="~{fragments/_quote_progress :: progress}"></div>
</div>

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/kg_boilers_db}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration

  config:
    import:
      - optional:file:.env[.properties]
      - classpath:catalog/boilers-combi.yml
      - classpath:catalog/boilers-system.yml
      - classpath:catalog/boilers-heat-only.yml

server:
  servlet:
    session:
      timeout: 2h

# =========================
# Resilience4j
# =========================

resilience4j:

  retry:
    retry-aspect-order: 1
    instances:
      postcodeApi:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - com.kgboilers.exception.ExternalServiceException
        ignore-exceptions:
          - com.kgboilers.exception.PostcodeNotFoundException

  circuitbreaker:
    circuit-breaker-aspect-order: 2
    instances:
      postcodeApi:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - com.kgboilers.exception.PostcodeNotFoundException

# =========================
# Logging
# =========================

logging:
  level:
    root: INFO
    com.kgboilers: INFO
    org.springframework.web: INFO
    io.github.resilience4j.retry: INFO
    io.github.resilience4j.circuitbreaker: INFO

